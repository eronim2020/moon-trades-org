<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog — Moon Trades</title>
<meta name="theme-color" content="#0A1929">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg-0:#0A1929; --bg-1:rgba(245,245,247,0.03); --text:#F5F5F7; --text-muted:#8b93a0; --mint:#5EE8C5; --terra:#A8927B; --hairline:rgba(245,245,247,0.08); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg-0); color:var(--text); font-family:'Inter',-apple-system,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
  a { color:var(--mint); text-decoration:none; }
  a:hover { color:#8ff0d6; }
</style>
</head>
<body>
  <nav style="position:sticky; top:0; z-index:100; background:rgba(10,25,41,0.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--hairline);">
    <div style="max-width:1200px; margin:0 auto; padding:16px 32px; display:flex; align-items:center; justify-content:space-between;">
      <a href="/" style="display:flex; align-items:center; gap:10px; color:var(--text);">
        <svg viewBox="0 0 120 120" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#F5F5F7" stroke-width="1" fill="none" opacity="0.5"><line x1="60" y1="60" x2="98.6" y2="70.4"/><line x1="60" y1="60" x2="70.3" y2="88.2"/><line x1="60" y1="60" x2="44.6" y2="102.3"/><line x1="60" y1="60" x2="36.5" y2="68.6"/><line x1="60" y1="60" x2="20.5" y2="45.6"/><line x1="60" y1="60" x2="48.7" y2="29.0"/><line x1="60" y1="60" x2="79.0" y2="27.1"/><line x1="60" y1="60" x2="80.7" y2="52.5"/><line x1="98.6" y1="70.4" x2="80.7" y2="52.5"/><line x1="44.6" y1="102.3" x2="36.5" y2="68.6"/><line x1="20.5" y1="45.6" x2="48.7" y2="29.0"/></g>
          <g fill="#F5F5F7"><circle cx="60" cy="60" r="9"/><circle cx="98.6" cy="70.4" r="5"/><circle cx="70.3" cy="88.2" r="3.5"/><circle cx="44.6" cy="102.3" r="6"/><circle cx="36.5" cy="68.6" r="4"/><circle cx="20.5" cy="45.6" r="5.5"/><circle cx="48.7" cy="29.0" r="3"/><circle cx="79.0" cy="27.1" r="5"/><circle cx="80.7" cy="52.5" r="3.5"/></g>
        </svg>
        <span style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; letter-spacing:0.06em;">MOON TRADES</span>
      </a>
      <a href="/" style="color:var(--text-muted); font-size:13.5px; font-weight:500;">← Back to site</a>
    </div>
  </nav>

  <header style="max-width:800px; margin:0 auto; padding:80px 32px 50px;">
    <div style="font-family:'Space Grotesk',sans-serif; font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--mint); margin-bottom:16px;">Blog</div>
    <h1 style="font-family:'Space Grotesk',sans-serif; font-size:clamp(28px,4vw,44px); font-weight:600; line-height:1.12;">News & notes from Moon Trades</h1>
  </header>

  <main style="max-width:800px; margin:0 auto; padding:0 32px 100px;">
    <div id="post-list" style="display:flex; flex-direction:column; gap:0;">
      <p style="color:var(--text-muted);">Loading posts…</p>
    </div>
  </main>

  <footer style="border-top:1px solid var(--hairline); padding:44px 32px; color:var(--text-muted); font-size:12px; text-align:center;">
    © 2026 Moon Trades S.R.L. · Iași, Romania
  </footer>

<script>
const POSTS = [
  "2026-07-15-esa-star-drumul-nostru.md"
  2026-07-20-de-ce-marea-majoritate-a-imm-urilor-românești-deep-tech-nu-ajung-la-esa-star-valid-full.md"
];

function parseFrontmatter(raw) {
  const m = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if (!m) return { data: {}, body: raw };
  const data = {};
  m[1].split("\n").forEach(line => {
    const mm = line.match(/^([a-zA-Z_]+):\s*"?(.*?)"?\s*$/);
    if (mm) data[mm[1]] = mm[2];
  });
  return { data, body: m[2].trim() };
}

async function loadPosts() {
  const container = document.getElementById("post-list");
  const items = [];
  for (const file of POSTS) {
    try {
      const res = await fetch("../content/blog/" + file);
      if (!res.ok) continue;
      const raw = await res.text();
      const { data } = parseFrontmatter(raw);
      if (data.published === "false") continue;
      items.push({ file, ...data });
    } catch (e) {}
  }
  items.sort((a, b) => new Date(b.date) - new Date(a.date));
  if (!items.length) {
    container.innerHTML = '<p style="color:var(--text-muted);">No posts yet.</p>';
    return;
  }
  container.innerHTML = items.map(p => `
    <a href="post.html?f=${encodeURIComponent(p.file)}" style="display:block; padding:28px 0; border-bottom:1px solid var(--hairline);">
      <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">${new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})} · ${p.author||''}</div>
      <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:20px; color:var(--text); margin-bottom:8px; line-height:1.3;">${p.title||p.file}</h2>
      <p style="color:var(--text-muted); font-size:14.5px;">${p.excerpt||''}</p>
    </a>
  `).join("");
}
loadPosts();
</script>
</body>
</html>
